<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&amp;family=Syne:wght@700;800&amp;display=swap');
    </style>

    <!-- Dark background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <!-- Accent teal gradient for name -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#58d9a0"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.2" opacity="0.06"/>
    </pattern>

    <!-- Glow filter for name -->
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Corner bracket clip -->
    <clipPath id="rounded">
      <rect width="900" height="280" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">

    <!-- Base background -->
    <rect width="900" height="280" fill="url(#bg)"/>

    <!-- Grid overlay -->
    <rect width="900" height="280" fill="url(#grid)"/>

    <!-- Decorative teal glow blob top-right -->
    <ellipse cx="820" cy="40" rx="160" ry="80" fill="#38bdf8" opacity="0.04"/>
    <!-- Decorative green glow blob bottom-left -->
    <ellipse cx="100" cy="240" rx="140" ry="70" fill="#58d9a0" opacity="0.05"/>

    <!-- Left accent bar -->
    <rect x="0" y="0" width="4" height="280" fill="url(#nameGrad)"/>

    <!-- Top-left corner bracket decoration -->
    <path d="M 30 20 L 30 50 M 30 20 L 60 20" stroke="#58d9a0" stroke-width="1.5" fill="none" opacity="0.7"/>
    <!-- Bottom-right corner bracket decoration -->
    <path d="M 870 260 L 870 230 M 870 260 L 840 260" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.7"/>

    <!-- Tag line: prompt style -->
    <text x="50" y="72" font-family="'Fira Code', monospace" font-size="13" fill="#58d9a0" opacity="0.9" letter-spacing="1">~/github/adricampo</text>
    <text x="265" y="72" font-family="'Fira Code', monospace" font-size="13" fill="#6b7280" opacity="0.8"> $ whoami</text>

    <!-- Main name -->
    <text
      x="50" y="160"
      font-family="'Syne', 'Arial Black', sans-serif"
      font-size="88"
      font-weight="800"
      fill="url(#nameGrad)"
      filter="url(#glow)"
      letter-spacing="-2"
    >ADRI CAMPO</text>

    <!-- Separator line -->
    <line x1="50" y1="180" x2="580" y2="180" stroke="url(#nameGrad)" stroke-width="1" opacity="0.3"/>

    <!-- Role label -->
    <text x="50" y="210" font-family="'Fira Code', monospace" font-size="15" fill="#94a3b8" letter-spacing="4">FRONTEND DEVELOPER</text>

    <!-- Stack pills -->
    <!-- React -->
    <rect x="50"  y="230" width="68"  height="22" rx="4" fill="#1e3a4a" stroke="#38bdf8" stroke-width="0.8" opacity="0.9"/>
    <text x="84"  y="245" font-family="'Fira Code', monospace" font-size="11" fill="#38bdf8" text-anchor="middle">React</text>

    <!-- TypeScript -->
    <rect x="126" y="230" width="90"  height="22" rx="4" fill="#1e2a3a" stroke="#3178c6" stroke-width="0.8" opacity="0.9"/>
    <text x="171" y="245" font-family="'Fira Code', monospace" font-size="11" fill="#60a5fa" text-anchor="middle">TypeScript</text>

    <!-- Next.js -->
    <rect x="224" y="230" width="68"  height="22" rx="4" fill="#1a1a2e" stroke="#6b7280" stroke-width="0.8" opacity="0.9"/>
    <text x="258" y="245" font-family="'Fira Code', monospace" font-size="11" fill="#d1d5db" text-anchor="middle">Next.js</text>

    <!-- TDD -->
    <rect x="300" y="230" width="46"  height="22" rx="4" fill="#2a1a1a" stroke="#c21325" stroke-width="0.8" opacity="0.9"/>
    <text x="323" y="245" font-family="'Fira Code', monospace" font-size="11" fill="#f87171" text-anchor="middle">TDD</text>

    <!-- +5 yrs -->
    <rect x="354" y="230" width="72" height="22" rx="4" fill="#1a2a1a" stroke="#58d9a0" stroke-width="0.8" opacity="0.9"/>
    <text x="390" y="245" font-family="'Fira Code', monospace" font-size="11" fill="#58d9a0" text-anchor="middle">5+ years</text>

    <!-- Location -->
    <text x="800" y="255" font-family="'Fira Code', monospace" font-size="12" fill="#6b7280" text-anchor="end" opacity="0.8">📍 Badalona, Barcelona</text>

  </g>

  <!-- Outer border -->
  <rect width="900" height="280" rx="12" fill="none" stroke="#30363d" stroke-width="1.5"/>
</svg>
